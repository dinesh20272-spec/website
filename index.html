<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello dk</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: "Segoe UI", Arial, sans-serif;
      color: #102033;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 180, 90, 0.55), transparent 28%),
        radial-gradient(circle at 80% 15%, rgba(49, 145, 255, 0.45), transparent 30%),
        radial-gradient(circle at 50% 85%, rgba(34, 197, 94, 0.36), transparent 34%),
        linear-gradient(135deg, #f8fbff 0%, #edf4ff 45%, #fff8ef 100%);
    }

    .glow {
      position: fixed;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      filter: blur(18px);
      opacity: 0.55;
      animation: float 8s ease-in-out infinite;
    }

    .glow.one {
      top: 12%;
      left: 8%;
      background: #ffb457;
    }

    .glow.two {
      right: 9%;
      bottom: 10%;
      background: #3b82f6;
      animation-delay: -3s;
    }

    .card {
      position: relative;
      width: min(92vw, 720px);
      padding: 64px 44px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 28px;
      text-align: center;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: 0 30px 90px rgba(39, 52, 72, 0.2);
      backdrop-filter: blur(22px);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 22px;
      padding: 10px 16px;
      border-radius: 999px;
      color: #17604a;
      background: rgba(34, 197, 94, 0.14);
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .spark {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 22px #22c55e;
    }

    h1 {
      font-size: clamp(3.4rem, 12vw, 8.5rem);
      line-height: 0.92;
      letter-spacing: 0;
      color: #0f172a;
    }

    h1 span {
      display: block;
      color: #1f7a5c;
    }

    p {
      max-width: 520px;
      margin: 26px auto 0;
      color: #5d6b7c;
      font-size: clamp(1rem, 2.2vw, 1.2rem);
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      margin-top: 34px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 22px;
      border-radius: 999px;
      color: #fff;
      background: #0f172a;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 16px 36px rgba(15, 23, 42, 0.24);
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .button.secondary {
      color: #0f172a;
      background: #fff;
    }

    .button:hover {
      transform: translateY(-3px);
      box-shadow: 0 22px 44px rgba(15, 23, 42, 0.28);
    }

    .rings {
      position: absolute;
      inset: -80px;
      z-index: -1;
      border-radius: 50%;
      border: 1px solid rgba(15, 23, 42, 0.08);
      animation: spin 18s linear infinite;
    }

    .rings::before,
    .rings::after {
      content: "";
      position: absolute;
      inset: 54px;
      border-radius: 50%;
      border: 1px solid rgba(31, 122, 92, 0.13);
    }

    .rings::after {
      inset: 112px;
      border-color: rgba(231, 111, 81, 0.18);
    }

    @keyframes float {
      0%,
      100% {
        transform: translate3d(0, 0, 0) scale(1);
      }

      50% {
        transform: translate3d(34px, -28px, 0) scale(1.08);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 540px) {
      .card {
        padding: 48px 24px;
        border-radius: 22px;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="glow one"></div>
  <div class="glow two"></div>

  <main class="card">
    <div class="rings"></div>
    <div class="badge"><span class="spark"></span> First HTML Moment</div>
    <h1>Hello <span>dk</span></h1>
    <p>A tiny page with a big mood: soft glass, colorful light, smooth motion, and a clean modern finish.</p>
    <div class="button-row">
      <a class="button" href="index.html">Open Homepage</a>
      <a class="button secondary" href="#">Stay Here</a>
    </div>
  </main>
</body>
</html>
